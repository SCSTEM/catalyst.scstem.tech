min_version = "2025.1.0"

[tools]
bun = "latest"

[env]
PAGES_PROJECT = "catalyst-scstem-tech"
CLOUDFLARE_INCLUDE_PROCESS_ENV = "true"

# Password the AccessGate checks. Six-digit code matching the OTP input.
SITE_PASSWORD = "000000"

# Cloudflare Turnstile secret - always pass
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"

[tasks.dev]
description = "Start worker + web dev servers"
run = "bun --filter '*' dev"

[tasks."dev:worker"]
description = "Start Wrangler dev server on :8787"
run = "bun --filter '@catalyst/worker' dev"

[tasks."dev:web"]
description = "Start Vite dev server on :5173"
run = "bun --filter '@catalyst/web' dev"

[tasks.typecheck]
description = "Type-check all packages (tsc -b)"
run = "bunx tsc -b"

[tasks.check]
description = "Lint + format with Biome (auto-fix)"
run = "bunx biome check --write ."

[tasks.verify]
description = "Run all quality checks (typecheck + lint)"
depends = ["typecheck", "check"]

[tasks."db:generate"]
description = "Generate Drizzle migration from schema"
run = "bunx drizzle-kit generate"
dir = "packages/worker"

[tasks.typegen]
description = "Generate Cloudflare Worker types"
run = "bunx wrangler types"
dir = "packages/worker"
